<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estación Arcade</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <h1>Estación de Arcade - ¡Tu entretención total!</h1>
    </header>

    <section class="video">

        <h2>Juegos de la semana</h2>
        <video width="440" height="248" controls>
            <source src="video/libraryofruina.mp4" type="video/mp4">
        </video>

        <video width="440" height="248" controls>
            <source src="video/lobotomycorporation.mp4" type="video/mp4">
        </video>

        <iframe 
            width="440" 
            height="248" 
            src="https://www.youtube-nocookie.com/embed/eJQ6-wP0RPY?si=whzc8_H8NP2UbGqs"
            title="Minecraft trailer" 
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            referrerpolicy="strict-origin-when-cross-origin" 
            allowfullscreen>
        </iframe>

    </section>

    <section class="productos">
        <h2>Nuestros productos</h2>

        <img src="img/steamdeck.png" class="imagen" alt="Steam Deck">
        <img src="img/nvi.png" class="imagen" alt="Computadora de Colección NAVI">
        <img src="img/xboxss.png" class="imagen" alt="Nuevo diseño de la Xbox">

    </section>

    <section class="contacto">
        <h2>Contacto</h2>
    </section>

    <footer>
        <p>©2024 Empresa de Videojuegos. Todos los derechos reservados</p>
    </footer>

</body>

</html>
