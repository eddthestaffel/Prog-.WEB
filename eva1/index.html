<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estación Arcade</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <h1>Estación de Arcade - ¡Tu entretención total!</h1>
    </header>

    <div class="video">

        <h2>Juegos de la semana</h2>

        <video controls>
            <source src="video/libraryofruina.mp4" type="video/mp4">
        </video>

        <video controls>
            <source src="video/lobotomycorporation.mp4" type="video/mp4">
        </video>

        <iframe src="https://www.youtube.com/embed/FM6L_CjR5ZE?si=jF4_rw0yCtK6un19"
            title="Último trailer de la actualización de la capa 8 'FRAUDE' de ULTRAKILL" frameborder="0" allow="accelerometer; 
            autoplay; clipboard-write; encrypted-media; gyroscope; 
            picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen>
        </iframe>

    </div>

    <div class="productos">

        <h2>Nuestros productos</h2>

        <img src="img/steamdeck.png" class="imagen" alt="Steam Deck">
        <img src="img/nvi.png" class="imagen" alt="Computadora de Colección NAVI">
        <img src="img/xboxss.png" class="imagen" alt="Nuevo diseño de la Xbox">

    </div>

    <div class="contacto">

        <h2>Contacto</h2>

        <!-- 23. Agregar un botón para limpiar el formulario (reset). -->

        <form action="gracias.html">
            <label for="fnombre">Nombre:</label>
            <input type="text" id="fnombre" name="fnombre" required>

            <label for="fapellido">Apellido:</label>
            <input type="text" id="fapellido" name="fapellido" required>

            <label for="correoe">Correo Electrónico:</label>
            <input type="email" id="correoe" name="correoe" required>

            <label for="mensaje">Mensaje:</label>
            <textarea id="mensaje" name="mensaje" required></textarea>

            <button type="submit">Enviar</button>
            <button type="reset">Limpiar formulario</button>

        </form>

    </div>

    <footer>
        <p>©2024 Empresa de Videojuegos. Todos los derechos reservados</p>
    </footer>

</body>

</html>
